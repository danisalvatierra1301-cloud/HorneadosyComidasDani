<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horneados y Comidas | Tienda Online</title>
    <!-- Google Fonts para tipografía moderna -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================
           RESET Y VARIABLES GLOBALES
           ========================================== */
        :root {
            --primary: #E65100;
            --primary-hover: #BF360C;
            --secondary: #FFB300;
            --dark: #212121;
            --light: #FAFAFA;
            --white: #FFFFFF;
            --gray-100: #F5F5F5;
            --gray-200: #EEEEEE;
            --gray-600: #757575;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--light);
            color: var(--dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ==========================================
           COMPONENTES REUTILIZABLES
           ========================================== */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            font-size: 1rem;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--primary);
            color: var(--white);
            box-shadow: 0 4px 15px rgba(230, 81, 0, 0.3);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* ==========================================
           CABECERA (HEADER)
           ========================================== */
        header {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0,0,0,0.03);
            border-bottom: 1px solid var(--gray-200);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span {
            color: var(--dark);
        }

        .cart-trigger {
            background: var(--gray-100);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: var(--transition);
        }

        .cart-trigger:hover {
            background-color: var(--gray-200);
            transform: scale(1.05);
        }

        .cart-trigger svg {
            width: 22px;
            height: 22px;
            fill: var(--dark);
        }

        .cart-count {
            position: absolute;
            top: -4px;
            right: -4px;
            background-color: var(--primary);
            color: var(--white);
            font-size: 0.75rem;
            font-weight: 800;
            width: 22px;
            height: 22px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--white);
        }

        /* ==========================================
           HERO SECTION
           ========================================== */
        .hero {
            padding: 80px 0;
            background: radial-gradient(circle at 10% 20%, rgba(255, 179, 0, 0.1) 0%, rgba(255, 255, 255, 0) 90%);
            text-align: center;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .hero h1 span {
            color: var(--primary);
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--gray-600);
            max-width: 600px;
            margin: 0 auto 32px auto;
        }

        /* ==========================================
           CATÁLOGO DE PRODUCTOS (GRID)
           ========================================== */
        .catalog-section {
            padding-bottom: 80px;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 40px;
            text-align: center;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 50px;
            height: 4px;
            background-color: var(--primary);
            margin: 12px auto 0 auto;
            border-radius: 2px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background-color: var(--white);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 1px solid rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        .product-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: var(--secondary);
            color: var(--dark);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .product-icon-wrapper {
            width: 80px;
            height: 80px;
            background-color: rgba(230, 81, 0, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto 24px auto;
        }

        .product-icon-wrapper svg {
            width: 40px;
            height: 40px;
            fill: var(--primary);
        }

        .product-info {
            text-align: center;
            margin-bottom: 24px;
        }

        .product-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--dark);
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
        }

        .btn-add-cart {
            width: 100%;
            background-color: var(--gray-100);
            color: var(--dark);
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: 700;
            padding: 12px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-add-cart:hover {
            background-color: var(--primary);
            color: var(--white);
        }

        .btn-add-cart svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* ==========================================
           CARRITO DE COMPRAS INTERACTIVO (DRAWER)
           ========================================== */
        .cart-drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .cart-drawer-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .cart-drawer {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 420px;
            height: 100%;
            background-color: var(--white);
            box-shadow: -10px 0 40px rgba(0,0,0,0.15);
            z-index: 1001;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .cart-drawer.active {
            right: 0;
        }

        .cart-header {
            padding: 24px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h3 {
            font-size: 1.25rem;
            font-weight: 800;
        }

        .close-cart {
            background: none;
            border: none;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .close-cart:hover {
            background-color: var(--gray-100);
        }

        .close-cart svg {
            width: 18px;
            height: 18px;
        }

        .cart-items-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--gray-100);
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .cart-item-price {
            color: var(--primary);
            font-weight: 800;
            font-size: 0.95rem;
        }

        .cart-item-qty-control {
            display: flex;
            align-items: center;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            overflow: hidden;
            width: fit-content;
            margin-top: 8px;
        }

        .qty-btn {
            background: none;
            border: none;
            width: 32px;
            height: 32px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .qty-btn:hover {
            background-color: var(--gray-100);
        }

        .qty-val {
            width: 32px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .remove-item {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: var(--transition);
        }

        .remove-item:hover {
            background-color: rgba(211, 47, 47, 0.05);
        }

        .remove-item svg {
            width: 18px;
            height: 18px;
            fill: #D32F2F;
        }

        .empty-cart-message {
            text-align: center;
            padding: 40px 0;
            color: var(--gray-600);
        }

        .cart-footer {
            padding: 24px;
            border-top: 1px solid var(--gray-200);
            background-color: var(--gray-100);
        }

        .cart-summary-line {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .cart-summary-line .total-price {
            font-size: 1.3rem;
            color: var(--primary);
            font-weight: 800;
        }

        .btn-checkout {
            width: 100%;
            background-color: #25D366;
            color: var(--white);
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            transition: var(--transition);
        }

        .btn-checkout:hover {
            background-color: #128C7E;
            transform: translateY(-2px);
        }

        .btn-checkout svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        /* ==========================================
           BOTÓN FLOTANTE WHATSAPP (CON BADGE ONLINE)
           ========================================== */
        .whatsapp-float-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25D366;
            color: var(--white);
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.4);
            z-index: 99;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .whatsapp-float-btn:hover {
            transform: translateY(-5px);
            background-color: #128C7E;
        }

        .whatsapp-float-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .online-badge {
            background-color: #00E676;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            position: relative;
        }

        .online-badge::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #00E676;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.2); opacity: 0; }
        }

        /* ==========================================
           PIE DE PÁGINA (FOOTER)
           ========================================== */
        footer {
            background-color: var(--dark);
            color: var(--white);
            padding: 60px 0 40px 0;
            text-align: center;
            border-top: 5px solid var(--primary);
        }

        footer h4 {
            font-size: 1.5rem;
            margin-bottom: 12px;
            color: var(--secondary);
        }

        footer p {
            color: #BDBDBD;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        footer .map-link {
            color: var(--secondary);
            text-decoration: underline;
            transition: var(--transition);
        }

        footer .map-link:hover {
            color: var(--white);
        }

        .copyright {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #424242;
            font-size: 0.85rem;
            color: #9E9E9E;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.2rem; }
            .hero p { font-size: 1.1rem; }
            .whatsapp-float-btn {
                bottom: 20px;
                right: 20px;
                padding: 12px;
            }
            .whatsapp-float-btn span { display: none; }
        }
    </style>
</head>
<body>

    <!-- CABECERA -->
    <header>
        <div class="container nav-container">
            <a href="#" class="logo">
                Horneados<span>& Comidas</span>
            </a>
            <button class="cart-trigger" id="cartTrigger" aria-label="Ver carrito">
                <svg viewBox="0 0 24 24">
                    <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
                </svg>
                <div class="cart-count" id="cartCount">0</div>
            </button>
        </div>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="container">
            <h1>Sabor Casero <span>Horneado al Instante</span></h1>
            <p>Disfruta de las empanadas más deliciosas y frescas de la zona, preparadas con ingredientes seleccionados de primera calidad.</p>
        </div>
    </section>

    <!-- SECCIÓN CATÁLOGO -->
    <section class="container catalog-section">
        <h2 class="section-title">Nuestro Menú</h2>
        <div class="products-grid" id="productsGrid">
            <!-- Los productos se inyectan dinámicamente con JavaScript -->
        </div>
    </section>

    <!-- CARRITO DE COMPRAS DESPLEGABLE (DRAWER) -->
    <div class="cart-drawer-overlay" id="cartOverlay"></div>
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <h3>Tu Pedido</h3>
            <button class="close-cart" id="closeCart">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="cart-items-container" id="cartItemsContainer">
            <!-- Items del carrito -->
        </div>
        <div class="cart-footer">
            <div class="cart-summary-line">
                <span>Total:</span>
                <span class="total-price" id="cartTotal">0.00 Bs</span>
            </div>
            <button class="btn-checkout" id="checkoutBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.717-1.455L0 24zm6.59-4.846c1.6.95 3.197 1.451 4.811 1.452 5.518 0 10.011-4.493 10.014-10.011.002-2.673-1.04-5.184-2.936-7.082C16.64 1.616 14.128.574 11.46.574 5.933.574 1.44 5.067 1.438 10.593c-.001 1.748.465 3.453 1.348 4.965l-.997 3.642 3.731-.978l1.127.668z"/>
                </svg>
                Finalizar Pedido por WhatsApp
            </button>
        </div>

<script
src="https://catza-digital.github.io/catza-ai-widget/widget.js"
data-client="horneadosdani"
data-position="right">
</script>
        
</body>
</html>
